name: Airalo API Tests

on:
  push:
    branches:
      - main
    paths:
      - "api-tests/**"

  workflow_dispatch:

jobs:
  api-tests:
    name: Run Bruno API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: api-tests/package-lock.json

      - name: Install dependencies
        working-directory: api-tests
        run: npm install

      - name: Run Airalo API tests
        working-directory: api-tests
        run: |
          mkdir -p results
          npx bru run --env production -r \
            --reporter-junit results/junit.xml \
            --delay 1000 \
            --env-var "clientId=${{ secrets.AIRALO_CLIENT_ID }}" \
            --env-var "clientSecret=${{ secrets.AIRALO_CLIENT_SECRET }}"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: api-tests/results/junit.xml
          if-no-files-found: ignore

      - name: Write job summary
        if: always()
        working-directory: api-tests
        run: |
          JUNIT="results/junit.xml"

          echo "## 🧪 Airalo API Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ ! -f "$JUNIT" ]; then
            echo "⚠️ No test results file found — the test run may have failed before producing output." >> $GITHUB_STEP_SUMMARY
          else
            python3 - << 'PYEOF'
          import xml.etree.ElementTree as ET, os

          junit = "results/junit.xml"
          out   = os.environ["GITHUB_STEP_SUMMARY"]

          root   = ET.parse(junit).getroot()
          suites = root.findall("testsuite") if root.tag == "testsuites" else [root]

          tests    = sum(int(s.get("tests",    0)) for s in suites)
          failures = sum(int(s.get("failures", 0)) for s in suites)
          errors   = sum(int(s.get("errors",   0)) for s in suites)
          skipped  = sum(int(s.get("skipped",  0)) for s in suites)
          duration = sum(float(s.get("time",   0)) for s in suites)
          passed   = tests - failures - errors - skipped

          status = "✅ All tests passed" if failures == 0 and errors == 0 else "❌ Some tests failed"

          with open(out, "a") as f:
              f.write(f"### {status}\n\n")
              f.write("| Metric | Value |\n|--------|-------|\n")
              f.write(f"| Total | {tests} |\n")
              f.write(f"| ✅ Passed | {passed} |\n")
              f.write(f"| ❌ Failed | {failures} |\n")
              f.write(f"| 💥 Errors | {errors} |\n")
              f.write(f"| ⏱ Duration | {duration:.3f}s |\n\n")

              if failures > 0 or errors > 0:
                  f.write("### ❌ Failed Tests\n\n")
                  for suite in suites:
                      for tc in suite.findall("testcase"):
                          if tc.find("failure") is not None or tc.find("error") is not None:
                              f.write(f"- `{suite.get('name')}` › **{tc.get('name')}**\n")
                  f.write("\n")
          PYEOF
          fi

          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "## 📦 Downloading the Full Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The raw JUnit XML report is uploaded as a workflow artifact named **\`api-test-results\`**." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**To download it:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Open the **Actions** tab in this repository." >> $GITHUB_STEP_SUMMARY
          echo "2. Click the workflow run you want to inspect." >> $GITHUB_STEP_SUMMARY
          echo "3. Scroll down to the **Artifacts** section." >> $GITHUB_STEP_SUMMARY
          echo "4. Click **\`api-test-results\`** to download the ZIP file." >> $GITHUB_STEP_SUMMARY
          echo "5. Extract it — you will find \`junit.xml\` inside." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**To read the results:**" >> $GITHUB_STEP_SUMMARY
          echo "- Open \`junit.xml\` in any browser or IDE — it is a standard JUnit XML file." >> $GITHUB_STEP_SUMMARY
          echo "- Or import it into a reporting tool such as **Allure**, **ReportPortal**, or any CI dashboard that supports JUnit XML." >> $GITHUB_STEP_SUMMARY
